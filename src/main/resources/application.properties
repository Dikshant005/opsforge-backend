spring.application.name=backend

# === DATABASE CONNECTION ===
spring.datasource.url=jdbc:postgresql://localhost:5432/opsforge
spring.datasource.username=postgres
spring.datasource.password=@Davsbg123

# === HIBERNATE MAGIC (Table Auto-Creation & SQL Logging) ===
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# === INITIAL ADMIN SETUP ===
app.setup.admin-username=admin
app.setup.admin-password=${ADMIN_PASSWORD}

# JWT Configuration
jwt.secret=${JWT_SECRET}

# Cloudinary Configuration
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}